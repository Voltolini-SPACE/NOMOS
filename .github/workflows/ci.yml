name: CI

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # Suíte completa em Linux + macOS (4 versões de Python cada). O Windows
  # NÃO roda a suíte completa: vários testes de integração usam sockets,
  # subprocessos e servidores locais (conectores MCP, painel/Dash E2E) que
  # são POSIX por natureza e falham só no Windows — SEM refletir bug de
  # produto. A cobertura do produto no Windows é garantida pelo job `smoke`
  # abaixo (build do wheel + `nomos doutor`), que roda em windows-latest.
  testes:
    name: ${{ matrix.os }} · py${{ matrix.python }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python: ["3.10", "3.11", "3.12", "3.13"]
    env:
      PYTHONUTF8: "1"        # saída pt-BR com emojis também no Windows
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      - name: Habilitar user namespaces (Linux)
        if: runner.os == 'Linux'
        run: sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0 || true

      - name: Instalar (com extras de desenvolvimento)
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Lint (ruff)
        run: python -m ruff check src tests

      - name: Testes (pytest)
        run: python -m pytest -q

      - name: "Gate read-only: consistência docs + marca (update agent)"
        run: python tools/nomos_update_agent.py --check --json

      - name: "Gate read-only: saúde do git (git agent)"
        run: python tools/nomos_git_agent.py --check --json

  cobertura:
    name: cobertura (informativa)
    runs-on: ubuntu-latest
    env:
      PYTHONUTF8: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Habilitar user namespaces (Linux)
        run: sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0 || true
      - run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
      - name: "Testes com cobertura (metas — kernel >=90%, geral >=80%)"
        run: python -m pytest -q --cov=nomos --cov-report=term --cov-fail-under=80

      - name: "Gate dirigido MC30-A5: módulos novos >=90%"
        run: >
          python -m pytest -q -p no:cacheprovider
          --cov=nomos.kernel.evidencia --cov=nomos.ext.skill_catalogo
          --cov-report=term --cov-fail-under=90
          tests/test_evidencia_pacote.py tests/test_mc29_skills_catalogo.py
          tests/test_mc29_painel.py tests/test_mc30_onda_a.py

  tipos:
    name: mypy (informativo)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: |
          python -m pip install --upgrade pip mypy
          python -m pip install -e .
      - name: "Checagem de tipos (kernel; nao bloqueante)"
        run: python -m mypy src/nomos/kernel --ignore-missing-imports || true

  smoke:
    name: smoke pós-instalação (wheel)
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    env:
      PYTHONUTF8: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Construir e instalar o wheel
        run: |
          python -m pip install --upgrade pip build
          python -m build --wheel
          python -m pip install dist/*.whl
        shell: bash
      - name: "Relatório de saúde (nomos doutor)"
        run: |
          nomos --version
          nomos doutor
        shell: bash
