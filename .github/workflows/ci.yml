name: CI

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # Suíte completa nos 3 SO × 4 versões de Python. O Windows voltou à matriz
  # depois de corrigida a causa raiz das falhas (MC46.3): os testes de CLI
  # rodavam o subprocesso com um `env` mínimo que descartava `SystemRoot`,
  # e sem ele o Python filho morria no Windows com
  # `_Py_HashRandomization_Init: failed to get random numbers`. Agora o env
  # dos subprocessos passa por `tests/_cli_env.py`, que preserva o essencial
  # do SO mantendo o PATH vazio (intenção dos testes de localidade).
  testes:
    name: ${{ matrix.os }} · py${{ matrix.python }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python: ["3.10", "3.11", "3.12", "3.13"]
    env:
      PYTHONUTF8: "1"        # saída pt-BR com emojis também no Windows
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      - name: Habilitar user namespaces (Linux)
        if: runner.os == 'Linux'
        run: sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0 || true

      - name: Instalar (com extras de desenvolvimento)
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Lint (ruff)
        run: python -m ruff check src tests

      - name: Testes (pytest)
        run: python -m pytest -q

      - name: "Gate read-only: consistência docs + marca (update agent)"
        run: python tools/nomos_update_agent.py --check --json

      - name: "Gate read-only: saúde do git (git agent)"
        run: python tools/nomos_git_agent.py --check --json

  # Achado P2-4 da auditoria de 2026-07-17: este job se chamava
  # "cobertura (informativa)", mas SEMPRE se comportou como bloqueante —
  # `--cov-fail-under=80`/`=90` abaixo fazem `pytest` sair com código != 0,
  # e (à época, ao contrário dos jobs `tipos`/`dependencias`, que TINHAM
  # `continue-on-error: true` de propósito, com comentário explicando o
  # rollout gradual — nota do Horizonte 3/item 5: os dois já foram
  # promovidos a bloqueantes também, ver comentários nos jobs abaixo; a
  # frase acima descreve o estado em que o P2-4 encontrou o CI, não o
  # atual) este job nunca teve essa flag — uma falha de cobertura sempre
  # marcou o job (e o commit/PR) como falho de verdade. Não havia nenhum
  # "// TODO: tornar bloqueante" documentando um rollout planejado
  # (diferente do pip-audit, abaixo) — era rótulo desatualizado, não uma
  # decisão registrada. Decisão explícita agora, sem ambiguidade:
  # POLICY_A=COBERTURA_BLOQUEANTE. Nome e comportamento passam a bater;
  # nenhum piso foi reduzido (medição atual: geral ~83%, kernel ~92%+,
  # ambos folgados acima de 80%/90% — formalizar como bloqueante não
  # quebra nada hoje). docs/ROADMAP_3.md (item A5) e CHANGELOG.md (MC30)
  # já tratavam isso como "gate" em linguagem de bloqueio — esta mudança
  # alinha o nome do job ao que a documentação estratégica e o
  # comportamento real já eram.
  cobertura:
    name: cobertura (bloqueante)
    runs-on: ubuntu-latest
    env:
      PYTHONUTF8: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Habilitar user namespaces (Linux)
        run: sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0 || true
      - run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
      - name: "Testes com cobertura (metas — kernel >=90%, geral >=80%)"
        run: python -m pytest -q --cov=nomos --cov-report=term --cov-fail-under=80

      - name: "Gate dirigido MC30-A5: módulos novos >=90%"
        run: >
          python -m pytest -q -p no:cacheprovider
          --cov=nomos.kernel.evidencia --cov=nomos.ext.skill_catalogo
          --cov-report=term --cov-fail-under=90
          tests/test_evidencia_pacote.py tests/test_mc29_skills_catalogo.py
          tests/test_mc29_painel.py tests/test_mc30_onda_a.py

  # Horizonte 3/item 5 da auditoria de 2026-07-17: promovido de informativo
  # para bloqueante. Desde o P2-11 (Horizonte 2) o comando abaixo já
  # retornava 0 de verdade (não mascarado) — `tests/test_p2_11_mypy_
  # estrutura.py::test_mypy_kernel_limpo_codigo_de_saida_real` prova isso
  # por subprocess real. O job só continuava informativo por não ter sido
  # promovido ainda; confirmado agora (mesmo comando, mesmo escopo) que
  # promover não quebra nada hoje. Escopo continua só `src/nomos/kernel`
  # de propósito — expandir para `src/nomos` inteiro reabriria os 77 erros
  # que o item 3 (Horizonte 3) já cortou e documentou como débito
  # separado, fora do corte mínimo deste item.
  tipos:
    name: mypy kernel (bloqueante)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: |
          python -m pip install --upgrade pip mypy
          python -m pip install -e .
      - name: "Checagem de tipos (kernel; bloqueante)"
        run: python -m mypy src/nomos/kernel --ignore-missing-imports

  dependencias:
    # Achado P1-10 da auditoria de 2026-07-17: o piso de `cryptography`
    # ficou meses desatualizado (>=42.0, predatava 3 CVEs divulgadas)
    # sem que nada no CI alertasse. O SBOM (CycloneDX) já gerado na Fase 0
    # é exatamente o tipo de insumo que essa checagem consome — este é o
    # primeiro consumidor real dele. Começou informativo (como o mypy
    # acima) para não travar merges legítimos no primeiro rollout.
    #
    # Horizonte 3/item 5 da auditoria de 2026-07-17: promovido a
    # bloqueante, depois de confirmado estável e de baixo ruído (critério
    # que este próprio comentário já previa). Achado real ao reproduzir o
    # comando exato deste job num venv limpo: a ÚNICA vulnerabilidade
    # encontrada era em `setuptools` — não uma dependência declarada do
    # NOMOS (`pyproject.toml` não fixa `setuptools`; é só requisito de
    # `[build-system]`, satisfeito por isolamento PEP 517 durante o build,
    # não pelo ambiente de instalação), e sim a versão antiga que
    # `python -m venv`/`actions/setup-python` semeiam por padrão no
    # ambiente de instalação. Corrigido incluindo `setuptools` na mesma
    # linha de upgrade que já trazia `pip`/`pip-audit`, abaixo — reproduzido
    # localmente: 0 vulnerabilidades depois do fix (nomos em si é sempre
    # listado como "Skip Reason", por não estar publicado no PyPI —
    # esperado, não é uma falha).
    name: pip-audit (bloqueante)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: |
          python -m pip install --upgrade pip setuptools pip-audit
          python -m pip install -e ".[dev]"
      - name: "Vulnerabilidades conhecidas nas dependências instaladas (bloqueante)"
        run: python -m pip_audit

  smoke:
    name: smoke pós-instalação (wheel)
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    env:
      PYTHONUTF8: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Construir e instalar o wheel
        run: |
          python -m pip install --upgrade pip build
          python -m build --wheel
          python -m pip install dist/*.whl
        shell: bash
      - name: "Relatório de saúde (nomos doutor)"
        run: |
          nomos --version
          nomos doutor
        shell: bash
