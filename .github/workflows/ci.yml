name: CI

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  testes:
    name: ${{ matrix.os }} · py${{ matrix.python }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python: ["3.10", "3.11", "3.12", "3.13"]
    env:
      PYTHONUTF8: "1"        # saída pt-BR com emojis também no Windows
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      - name: Habilitar user namespaces (Linux)
        if: runner.os == 'Linux'
        run: sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0 || true

      - name: Instalar (com extras de desenvolvimento)
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Lint (ruff)
        run: python -m ruff check src tests

      - name: Testes (pytest)
        run: python -m pytest -q

  cobertura:
    name: cobertura (informativa)
    runs-on: ubuntu-latest
    env:
      PYTHONUTF8: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Habilitar user namespaces (Linux)
        run: sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0 || true
      - run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
      - name: "Testes com cobertura (metas — kernel >=90%, geral >=80%)"
        run: python -m pytest -q --cov=nomos --cov-report=term --cov-fail-under=80

  tipos:
    name: mypy (informativo)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: |
          python -m pip install --upgrade pip mypy
          python -m pip install -e .
      - name: "Checagem de tipos (kernel; nao bloqueante)"
        run: python -m mypy src/nomos/kernel --ignore-missing-imports || true
