name: Publicar site (GitHub Pages)

# Publica a landing estática (site/) num link de teste do GitHub Pages.
# URL final (repo de projeto): https://voltolini-space.github.io/NOMOS/
#
# Pré-requisito (uma vez): Settings → Pages → Build and deployment →
# Source: "GitHub Actions". Depois, todo push que mexa em site/ republica.

on:
  push:
    branches: [main]
    paths:
      - "site/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./site          # publica só a landing estática, nada do resto do repo
      - id: deployment
        uses: actions/deploy-pages@v4
